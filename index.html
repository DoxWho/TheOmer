<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700;900&display=swap');
    body { margin: 0; padding: 0; background: #FDFBF7; }
    * { box-sizing: border-box; }
    .font-display { font-family: 'Bebas Neue', sans-serif; }
    .font-body { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── HERITAGE CARD ── */
    .heritage-card {
      background: linear-gradient(135deg, #001f6b 0%, #0038b8 60%, #1a5dd4 100%);
      border: 6px solid #0038b8 !important;
      position: relative;
      overflow: hidden;
    }
    .heritage-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .heritage-card::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -30px;
      width: 90px; height: 90px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .heritage-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,50,0.92);
      z-index: 400;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .heritage-modal {
      background: white;
      border: 8px solid #0038b8;
      border-radius: 2.5rem;
      max-width: 860px;
      width: 100%;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,56,184,0.4);
      overflow: hidden;
    }
    .heritage-tab-bar {
      display: flex;
      border-bottom: 4px solid #e0e9ff;
    }
    .heritage-tab {
      flex: 1;
      padding: 1rem 0.5rem;
      font-weight: 900;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
    }
    .heritage-tab.active {
      background: #0038b8;
      color: white;
    }
    .heritage-tab:not(.active) {
      background: white;
      color: #94a3b8;
    }
    .heritage-tab:not(.active):hover {
      background: #f0f5ff;
      color: #0038b8;
    }
    .heritage-section-title {
      font-size: 1.5rem;
      font-weight: 900;
      color: #0038b8;
      margin: 0 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .heritage-body-text {
      font-size: 1.1rem;
      line-height: 1.75;
      color: #334155;
      font-weight: 500;
    }
    .heritage-callout {
      background: #f0f5ff;
      border-left: 5px solid #0038b8;
      border-radius: 0 0.75rem 0.75rem 0;
      padding: 1rem 1.25rem;
      margin: 1rem 0;
    }
    .heritage-callout p { margin: 0; font-size: 1rem; color: #1e3a8a; font-weight: 700; line-height: 1.6; }
    .heritage-challenge-card {
      background: #0038b8;
      color: white;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-top: 0.75rem;
    }
    .heritage-challenge-card h4 { margin: 0 0 0.6rem; font-size: 1.1rem; font-weight: 900; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; }
    .heritage-challenge-card p { margin: 0; font-size: 1.05rem; line-height: 1.6; font-weight: 700; }
    .heritage-complete-btn {
      background: #0038b8;
      color: white;
      border: none;
      border-radius: 1.5rem;
      padding: 1.1rem 2rem;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }
    .heritage-complete-btn:hover { background: #002a8f; }
    .heritage-complete-btn.completed { background: #15803d; }
    .magen-david {
      display: inline-block;
      font-size: 1.6rem;
      line-height: 1;
    }
    @keyframes pulse { 0%,100% { transform:scale(1); box-shadow:0 0 0 0 rgba(255,255,255,0.4); } 50% { transform:scale(1.05); box-shadow:0 0 0 10px rgba(255,255,255,0); } }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
  </style>
</head>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const HERITAGE_LS_KEY = 'harvest_path_heritage_completed';

function getHeritageCompleted() {
  try {
    const raw = localStorage.getItem(HERITAGE_LS_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function setHeritageCompleted(day) {
  try {
    const cur = getHeritageCompleted();
    cur[day] = { completedAt: new Date().toISOString() };
    localStorage.setItem(HERITAGE_LS_KEY, JSON.stringify(cur));
  } catch {}
}

/* ── YOM HAZIKARON SIREN PLAYER ── */
function SirenPlayer() {
  const [phase, setPhase] = React.useState('idle'); // idle | playing | done
  const [elapsed, setElapsed] = React.useState(0);
  const audioCtxRef = React.useRef(null);
  const gainRef = React.useRef(null);
  const oscRef = React.useRef(null);
  const intervalRef = React.useRef(null);
  const DURATION = 120;

  const startSiren = () => {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioCtx();
      audioCtxRef.current = ctx;
      const gain = ctx.createGain();
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.5);
      gainRef.current = gain;
      const osc = ctx.createOscillator();
      osc.connect(gain);
      osc.type = 'sawtooth';
      const now = ctx.currentTime;
      // Siren sweep: 300hz → 600hz over 3s, then 600→300 over 3s, repeat
      const sweepDuration = 3.0;
      for (let i = 0; i < 40; i++) {
        const t = now + i * sweepDuration;
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.linearRampToValueAtTime(600, t + sweepDuration/2);
        osc.frequency.linearRampToValueAtTime(300, t + sweepDuration);
      }
      osc.start(now);
      osc.stop(now + DURATION + 1);
      oscRef.current = osc;
      osc.onended = () => {
        setPhase('done');
        clearInterval(intervalRef.current);
      };
      setPhase('playing');
      setElapsed(0);
      intervalRef.current = setInterval(() => {
        setElapsed(e => {
          if (e >= DURATION - 1) {
            clearInterval(intervalRef.current);
            gain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 1);
            return DURATION;
          }
          return e + 1;
        });
      }, 1000);
    } catch(e) {
      alert('Audio not supported in this browser. Please use Chrome or Firefox.');
    }
  };

  const stopSiren = () => {
    clearInterval(intervalRef.current);
    if (oscRef.current) try { oscRef.current.stop(); } catch(e) {}
    if (gainRef.current) try { gainRef.current.gain.linearRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.3); } catch(e){}
    if (audioCtxRef.current) setTimeout(()=>{ try { audioCtxRef.current.close(); } catch(e){} }, 500);
    setPhase('idle'); setElapsed(0);
  };

  const remaining = DURATION - elapsed;
  const fmtT = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

  return (
    <div style={{background:'#0038b8',borderRadius:'1.5rem',padding:'1.5rem',color:'white',marginTop:'1.5rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom:'1rem'}}>
        <Icons.Sound size={26} color="white"/>
        <div>
          <p style={{margin:0,fontWeight:900,fontSize:'1.1rem'}}>Two-Minute Siren</p>
          <p style={{margin:0,fontSize:'0.8rem',opacity:0.75}}>The memorial siren that stops all of Israel</p>
        </div>
      </div>
      {phase === 'idle' && (
        <div style={{display:'flex',flexDirection:'column',gap:'0.75rem'}}>
          <p style={{margin:0,fontSize:'0.9rem',lineHeight:1.6,opacity:0.85}}>At 11:00 AM on Yom Hazikaron, a two-minute siren sounds across Israel. All traffic stops. People stand in silence wherever they are. Click below to experience the siren with your class.</p>
          <button onClick={startSiren}
            style={{background:'white',color:'#0038b8',border:'none',borderRadius:'1rem',padding:'0.85rem 1.5rem',fontWeight:900,fontSize:'1.1rem',cursor:'pointer',display:'flex',alignItems:'center',gap:'0.6rem',justifyContent:'center'}}>
            <Icons.Sound size={20} color="#0038b8"/> Sound the Siren (2 minutes)
          </button>
        </div>
      )}
      {phase === 'playing' && (
        <div style={{textAlign:'center',display:'flex',flexDirection:'column',gap:'1rem',alignItems:'center'}}>
          <div style={{width:'6rem',height:'6rem',borderRadius:'50%',background:'rgba(255,255,255,0.15)',border:'4px solid white',display:'flex',alignItems:'center',justifyContent:'center',animation:'pulse 1s infinite'}}>
            <span style={{fontSize:'2rem',fontWeight:900}}>{fmtT(remaining)}</span>
          </div>
          <p style={{margin:0,fontWeight:900,fontSize:'1.1rem',opacity:0.9}}>Stand in silence. Remember.</p>
          <button onClick={stopSiren}
            style={{background:'rgba(255,255,255,0.2)',color:'white',border:'2px solid rgba(255,255,255,0.5)',borderRadius:'0.75rem',padding:'0.5rem 1.25rem',fontWeight:900,cursor:'pointer',fontSize:'0.9rem'}}>
            End Siren
          </button>
        </div>
      )}
      {phase === 'done' && (
        <div style={{textAlign:'center',display:'flex',flexDirection:'column',gap:'0.75rem'}}>
          <p style={{margin:0,fontWeight:900,fontSize:'1.1rem'}}>The siren has ended.</p>
          <p style={{margin:0,fontSize:'0.9rem',opacity:0.85,fontStyle:'italic'}}>"We will not forget. We will not remain silent."</p>
          <button onClick={()=>setPhase('idle')} style={{background:'rgba(255,255,255,0.2)',color:'white',border:'2px solid rgba(255,255,255,0.4)',borderRadius:'0.75rem',padding:'0.5rem 1rem',fontWeight:900,cursor:'pointer',fontSize:'0.9rem'}}>Sound Again</button>
        </div>
      )}
    </div>
  );
}

/* ── RANDOM STUDENT PICKER (sidebar) ── */
function StudentPicker({ students }) {
  const [queue, setQueue] = useState([]);
  const [current, setCurrent] = useState(null);
  const pickNext = () => {
    let q = queue.length > 0 ? queue : shuffle(students);
    if (!q.length) return;
    setCurrent(q[0]);
    setQueue(q.slice(1));
  };
  return (
    <div style={{background:'white',border:'4px solid #2D2D2D',borderRadius:'1.5rem',padding:'1rem',boxShadow:'4px 4px 0 #2D2D2D'}}>
      <p className="font-body" style={{fontSize:'0.7rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94a3b8',marginBottom:'0.5rem'}}>Next Student</p>
      <div style={{background:'#f8fafc',border:'2px solid #e2e8f0',borderRadius:'0.75rem',padding:'0.75rem',textAlign:'center',minHeight:'3rem',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'0.75rem'}}>
        {current
          ? <span className="font-body" style={{fontWeight:900,fontSize:'1.2rem',color:'#1A365D'}}>{current}</span>
          : <span className="font-body" style={{fontWeight:'bold',color:'#cbd5e1',fontStyle:'italic',fontSize:'0.9rem'}}>Click to pick</span>}
      </div>
      <button onClick={pickNext}
        style={{width:'100%',background:'#1A365D',color:'white',padding:'0.5rem',borderRadius:'0.75rem',fontWeight:900,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'0.4rem',fontSize:'0.85rem'}}>
        <Icons.Dice size={16} color="white"/> {queue.length===0&&current?'Reshuffle & Pick':'Pick Student'}
      </button>
      {queue.length > 0 && <p className="font-body" style={{fontSize:'0.75rem',color:'#94a3b8',textAlign:'center',marginTop:'0.25rem'}}>{queue.length} remaining</p>}
    </div>
  );
}

/* ── PAIR DISPLAY (endurance + trust) ── */
function PairDisplay({ students }) {
  const [pairs, setPairs] = useState(null);
  const generate = () => {
    const s = shuffle(students);
    const result = [];
    let i = 0;
    while (i < s.length) {
      if (i === s.length - 3 || (i === s.length - 1 && s.length % 2 === 1)) {
        result.push(s.slice(i, i+3)); i += 3;
      } else {
        result.push(s.slice(i, i+2)); i += 2;
      }
    }
    setPairs(result);
  };
  return (
    <div style={{background:'#eff6ff',border:'4px solid #bfdbfe',borderRadius:'1.5rem',padding:'1.25rem',marginBottom:'1rem'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.75rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:'0.5rem'}}>
          <Icons.Users size={20} color="#1A365D"/>
          <span className="font-body" style={{fontWeight:900,color:'#1A365D',textTransform:'uppercase',letterSpacing:'0.05em',fontSize:'0.9rem'}}>Student Pairs</span>
        </div>
        <button onClick={generate}
          style={{background:'#1A365D',color:'white',padding:'0.5rem 1rem',borderRadius:'0.75rem',fontWeight:900,border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'0.4rem',fontSize:'0.85rem'}}>
          <Icons.Dice size={16} color="white"/> Generate
        </button>
      </div>
      {pairs ? (

/* ── CHARADES GUESSERS ── */
function CharadesGuessers({ students }) {
  const [queue, setQueue] = useState([]);
  const [guessers, setGuessers] = useState(null);
  const pickGuessers = () => {
    let q = [...queue];
    while (q.length < 3) q = [...q, ...shuffle(students)];
    setGuessers(q.slice(0,3));
    setQueue(q.slice(3));
  };
  return (
    <div style={{background:'#fefce8',border:'4px solid #fde68a',borderRadius:'1.5rem',padding:'1.25rem',marginBottom:'1rem'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.75rem'}}>

          <Icons.Users size={20} color="#92400e"/>
          <span className="font-body" style={{fontWeight:900,color:'#92400e',textTransform:'uppercase',letterSpacing:'0.05em',fontSize:'0.9rem'}}>Guessers</span>
        </div>
        <button onClick={pickGuessers}
          style={{background:'#D4AF37',color:'white',padding:'0.5rem 1rem',borderRadius:'0.75rem',fontWeight:900,border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'0.4rem',fontSize:'0.85rem'}}>
          <Icons.Dice size={16} color="white"/> New Guessers

        <div style={{display:'flex',gap:'0.5rem',justifyContent:'center',flexWrap:'wrap'}}>

            <div key={i} style={{background:'white',border:'2px solid #fde68a',borderRadius:'0.75rem',padding:'0.5rem 1.2rem',fontWeight:900,color:'#1A365D',fontSize:'1.1rem'}}>{g}</div>

  );
}

/* ── GRATITUDE STUDENT CALLER ── */
function GratitudeCaller({ students, currentLetter }) {
  const [queue, setQueue] = useState([]);
  const [current, setCurrent] = useState(null);
  const pickNext = () => {
    let q = queue.length > 0 ? queue : shuffle(students);
    setCurrent(q[0]);
    setQueue(q.slice(1));
  };
  return (
    <div style={{background:'#fefce8',border:'4px solid #fde68a',borderRadius:'1.25rem',padding:'1rem',marginBottom:'0.75rem',display:'flex',alignItems:'center',gap:'1rem'}}>

        {current
          ? <p className="font-body" style={{fontWeight:900,fontSize:'1.5rem',color:'#1A365D',margin:0}}>{current}</p>

      </button>
    </div>

}

  const [switchModal, setSwitchModal] = useState(false);
  const [matchSelected, setMatchSelected] = useState(null);
  const [matchedPairs, setMatchedPairs] = useState([]);
  const [matchFeedback, setMatchFeedback] = useState(null);
  const [gratitudeEntries, setGratitudeEntries] = useState({});
  const [gratitudeLetter, setGratitudeLetter] = useState(0);
  const [gematriaOpen, setGematriaOpen] = useState(false);
  const [wrongFlash, setWrongFlash] = useState(false);
  const [gevurahWrong, setGevurahWrong] = useState(new Set());
  const [heritageModal, setHeritageModal] = useState(null); // day number or null
  const [heritageCompleted, setHeritageCompletedState] = useState(() => getHeritageCompleted());

  const setTimerMinutes = (m) => { setTimerMinutesState(m); setTimeLeft(m*60); };

  useEffect(() => {
    if (gameState!=='playing') return;
    if (timeLeft<=0) return;
    const t = setInterval(() => setTimeLeft(p=>p-1), 1000);
    return () => clearInterval(t);
  }, [gameState, timeLeft]);

  const resetGameMode = () => {
    setActiveMode('learning'); setGameStep(0); setRevealedTasks({});
    setMatchSelected(null); setMatchedPairs([]); setMatchFeedback(null);
    setGematriaOpen(false); setGratitudeLetter(0); setGevurahWrong(new Set());
  };

  const jumpToWeek = (id) => { setCurrentWeek(id); resetGameMode(); };
  const handleNextWeek = () => {
    const idx = WEEK_SEQUENCE.indexOf(currentWeek);
    if (idx < WEEK_SEQUENCE.length-1) jumpToWeek(WEEK_SEQUENCE[idx+1]);
    else setGameState('finished');
  };

  const addScore = (pts) => setScore(s=>s+pts);
  const handleCorrect = (info, g33) => { addScore(25); setCorrectModal({info, gematria33:g33||null}); };
  const closeCorrect = () => { setCorrectModal(null); setGameStep(s=>s+1); };

  const flashWrong = () => { setWrongFlash(true); setTimeout(()=>setWrongFlash(false),600); };

  const handleHeritageComplete = (day) => {
    setHeritageCompletedState(prev => ({...prev, [day]: {completedAt: new Date().toISOString()}}));
    addScore(50);
  };

  const handleMatchClick = (value, side) => {
    if (!currentWeek) return;
    const content = WEEK_CONTENT[currentWeek];
    if (matchedPairs.includes(value)) return;
    if (side==='q') { setMatchSelected(value); setMatchFeedback(null); }
    else if (matchSelected) {
      const pair = content.game.pairs.find(p=>p.q===matchSelected);
      if (pair && pair.a===value) {
        const np = [...matchedPairs, matchSelected, value];
        setMatchedPairs(np); addScore(25);
        setMatchFeedback({type:'correct',msg:'Correct match!'});
        if (np.length===content.game.pairs.length*2)
          setTimeout(()=>setMatchFeedback({type:'done',msg:'All matched — perfect Tiferet!'}),400);
      } else {
        setMatchFeedback({type:'wrong',msg:'Not quite — try again!'}); flashWrong();
      }
      setMatchSelected(null);
    }
  };

  const handleGevurahSelect = (item, idx) => {
    if (item.type==='boundary') {
      addScore(10); setGameStep(s=>s+1); setMatchFeedback(null);
      setGevurahWrong(prev => { const n=new Set(prev); n.delete(idx); return n; });
    } else {
      flashWrong();
      setGevurahWrong(prev => { const n=new Set(prev); n.add(idx); return n; });
      setMatchFeedback({type:'wrong',msg:'Chaos breaks the shield! That is not a Boundary — try again.'});

                            {!filtered && <p style={{fontWeight:900,color:'#1A365D',fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.08em',margin:'0.5rem 0 0.25rem'}}>Week {wi+1} — Days {wi*7+1}–{(wi+1)*7}</p>}
                            {(filtered || group).map(dc => (
                              <div key={dc.day} style={{background:'white',border:'2px solid #e2e8f0',borderRadius:'0.75rem',padding:'0.65rem 1rem'}}>
                                <div style={{display:'flex',alignItems:'flex-start',gap:'0.75rem'}}>
                                  <span style={{fontWeight:900,color:'#D4AF37',fontSize:'1.2rem',flexShrink:0,minWidth:'3.5rem',lineHeight:1.2}}>Day {dc.day}</span>
                                  <div style={{flex:1}}>
                                    <p style={{fontWeight:900,color:'#1A365D',fontSize:'0.9rem',direction:'rtl',margin:'0 0 0.1rem',lineHeight:1.5}}>{dc.he}</p>
                                    <p style={{fontSize:'0.8rem',color:'#64748b',margin:0}}>{dc.en}</p>
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                        ))}
                      </div>
                    )}
                    {appTab==='about' && (
                      <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
                        <div style={{background:'#FDFBF7',border:'3px dashed #D4AF37',borderRadius:'1.5rem',padding:'1.5rem'}}>
                          <p style={{fontWeight:900,color:'#1A365D',fontSize:'1.1rem',margin:'0 0 0.75rem'}}>What is Sefirat HaOmer?</p>
                          <p style={{fontSize:'1rem',lineHeight:1.7,color:'#334155',margin:0}}>Sefirat HaOmer is the 49-day period between Passover and Shavuot. We count each day as a spiritual preparation for receiving the Torah. The word "Omer" refers to the ancient barley offering brought to the Temple on the second day of Passover. Today we count without the Temple, but the practice connects us to Israel's agricultural calendar and to our people's spiritual journey from slavery at Passover to revelation at Sinai.</p>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
                          {[
                            { label:"Sefaria: Leviticus 23:15 (source)", url:"https://www.sefaria.org/Leviticus.23.15?lang=bi", color:"#004E5F" },
                            { label:"My Jewish Learning: The Omer", url:"https://www.myjewishlearning.com/article/counting-the-omer/", color:"#1A365D" },
                            { label:"Chabad: Full Omer Counting", url:"https://www.chabad.org/holidays/sefirat_haomer/default_cdo/jewish/Sefirat-HaOmer.htm", color:"#8B0000" },
                            { label:"The iCenter: Teaching the Omer", url:"https://theicenter.org/", color:"#2d6a4f" },
                          ].map((r,i)=>(
                            <a key={i} href={r.url} target="_blank" rel="noopener noreferrer"
                              style={{display:'flex',alignItems:'center',gap:'0.5rem',padding:'0.75rem 1rem',background:'white',border:`2px solid ${r.color}`,borderRadius:'0.75rem',textDecoration:'none',color:r.color,fontWeight:700,fontSize:'0.85rem'}}>
                              <Icons.ExternalLink size={14} color={r.color}/>{r.label}
                            </a>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* TRUST CONNECTION */}
              {content.game.type==='trust' && (
                <div style={{display:'flex',flexDirection:'column',gap:'0.75rem'}}>
                  <PairDisplay students={students}/>
                  {content.game.tasks.map((task,idx)=>{
                    const done=gameStep>idx, active=gameStep===idx;
                    return (
                      <div key={idx} style={{padding:'2rem',border:'4px solid',borderRadius:'1.75rem',transition:'all 0.2s',
                        background:done?'#f0fdf4':active?'#eff6ff':'#f8fafc',
                        borderColor:done?'#16a34a':active?'#3b82f6':'#e2e8f0'}}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'2rem'}}>
                          <div style={{flex:1}}>
                            <p style={{fontSize:'0.7rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94a3b8',marginBottom:'0.5rem'}}>Task {idx+1}</p>
                            {gameStep>=idx
                              ? <p style={{fontSize:'1.3rem',fontWeight:900,color:'#1d4ed8',lineHeight:1.5,margin:0}}>{task.q}</p>
                              : <p style={{fontSize:'1.3rem',fontWeight:900,color:'#cbd5e1',fontStyle:'italic',margin:0}}>Locked</p>}
                          </div>
                          {active&&<button onClick={()=>{addScore(25);if(task.switchAfter)setSwitchModal(true);else setGameStep(s=>s+1);}} style={{background:'#16a34a',color:'white',padding:'1rem 2rem',borderRadius:'1.25rem',fontWeight:900,fontSize:'1.2rem',border:'none',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',gap:'0.5rem'}}><Icons.Check size={22} color="white"/> Done!</button>}
                          {done&&<Icons.Check size={36}/>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* GRATITUDE GRID */}
              {content.game.type==='gratitude' && (
                <div style={{display:'flex',flexDirection:'column',gap:'1.25rem',paddingBottom:'2rem'}}>
                  <GratitudeCaller students={students} currentLetter={ALPHABET[gratitudeLetter]}/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#fefce8',border:'2px solid #fde68a',padding:'1.25rem',borderRadius:'1.25rem'}}>
                    <p style={{fontWeight:'bold',fontStyle:'italic',color:'#92400e',fontSize:'1rem',margin:0}}>Think about: friends, family, synagogue, yourself, being Jewish — or anything that matters!</p>
                    <button onClick={exportGratitude} style={{background:'white',border:'2px solid #92400e',color:'#92400e',padding:'0.6rem 1.2rem',borderRadius:'0.75rem',fontWeight:900,cursor:'pointer',display:'flex',alignItems:'center',gap:'0.4rem',flexShrink:0,marginLeft:'1rem',fontSize:'0.9rem'}}>
                      <Icons.Download size={18} color="#92400e"/> Export
                    </button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.75rem'}}>
                    {ALPHABET.map((letter,li)=>(
                      <div key={letter} onClick={()=>setGratitudeLetter(li)}
                        style={{background:'white',border:`2px solid ${gratitudeLetter===li?'#D4AF37':'#e2e8f0'}`,borderRadius:'0.75rem',padding:'0.75rem',display:'flex',flexDirection:'column',cursor:'pointer',background:gratitudeLetter===li?'#fefce8':'white',transition:'all 0.15s'}}>
                        <span style={{fontSize:'1.5rem',fontWeight:900,color:gratitudeLetter===li?'#D4AF37':'#e2e8f0',marginBottom:'0.25rem'}}>{letter}</span>
                        <input type="text" placeholder="..."
                          value={gratitudeEntries[letter]||''}
                          onChange={e=>setGratitudeEntries(p=>({...p,[letter]:e.target.value}))}
                          onClick={e=>{e.stopPropagation();setGratitudeLetter(li);}}
                          style={{border:'none',borderBottom:'2px solid #f1f5f9',outline:'none',fontSize:'1rem',fontWeight:'bold',color:'#1A365D',padding:'0.2rem 0',background:'transparent',width:'100%'}}
                        />
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>{addScore(100);setGameState('finished');}} className="font-display"
                    style={{width:'100%',background:'#1A365D',color:'white',padding:'2rem',borderRadius:'2rem',fontSize:'2.5rem',letterSpacing:'0.05em',border:'none',cursor:'pointer',marginTop:'1rem',boxShadow:'0 8px 24px rgba(26,54,93,0.3)'}}>
                    FINISH JOURNEY TO SINAI
                  </button>
                </div>
              )}

            </div>
          )}
        </div>
      </div>

      {/* FOOTER NAV */}
      <div style={{display:'flex',justifyContent:'center',gap:'0.75rem',background:'rgba(255,255,255,0.4)',padding:'0.75rem 1rem',borderRadius:'9999px',border:'2px solid #e2e8f0',flexWrap:'wrap'}}>
        {WEEK_SEQUENCE.map(w=>(
          <button key={w} onClick={()=>jumpToWeek(w)} title={WEEK_CONTENT[w].title}
            style={{padding:'0.5rem 1.5rem',borderRadius:'1.25rem',fontWeight:900,border:'4px solid',cursor:'pointer',transition:'all 0.15s',fontSize:'0.85rem',
              background:currentWeek===w?'#1A365D':'white',
              color:currentWeek===w?'white':'#cbd5e1',
              borderColor:currentWeek===w?'#1A365D':'#e2e8f0',
              boxShadow:currentWeek===w?'0 4px 16px rgba(26,54,93,0.3)':'none'}}>
            {w===33?'D33':w===28?'D28':w===29?'D29':`W${w}`}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
