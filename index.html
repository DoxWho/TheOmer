<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Harvest Path — Sefirat HaOmer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700;900&display=swap');
    body { margin: 0; padding: 0; background: #FDFBF7; }
    * { box-sizing: border-box; }
    .font-display { font-family: 'Bebas Neue', sans-serif; }
    .font-body { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── HERITAGE CARD ── */
    .heritage-card {
      background: linear-gradient(135deg, #001f6b 0%, #0038b8 60%, #1a5dd4 100%);
      border: 6px solid #0038b8 !important;
      position: relative;
      overflow: hidden;
    }
    .heritage-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .heritage-card::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -30px;
      width: 90px; height: 90px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .heritage-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,50,0.92);
      z-index: 400;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .heritage-modal {
      background: white;
      border: 8px solid #0038b8;
      border-radius: 2.5rem;
      max-width: 860px;
      width: 100%;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,56,184,0.4);
      overflow: hidden;
    }
    .heritage-tab-bar {
      display: flex;
      border-bottom: 4px solid #e0e9ff;
    }
    .heritage-tab {
      flex: 1;
      padding: 1rem 0.5rem;
      font-weight: 900;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
    }
    .heritage-tab.active {
      background: #0038b8;
      color: white;
    }
    .heritage-tab:not(.active) {
      background: white;
      color: #94a3b8;
    }
    .heritage-tab:not(.active):hover {
      background: #f0f5ff;
      color: #0038b8;
    }
    .heritage-section-title {
      font-size: 1.5rem;
      font-weight: 900;
      color: #0038b8;
      margin: 0 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .heritage-body-text {
      font-size: 1.1rem;
      line-height: 1.75;
      color: #334155;
      font-weight: 500;
    }
    .heritage-callout {
      background: #f0f5ff;
      border-left: 5px solid #0038b8;
      border-radius: 0 0.75rem 0.75rem 0;
      padding: 1rem 1.25rem;
      margin: 1rem 0;
    }
    .heritage-callout p { margin: 0; font-size: 1rem; color: #1e3a8a; font-weight: 700; line-height: 1.6; }
    .heritage-challenge-card {
      background: #0038b8;
      color: white;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-top: 0.75rem;
    }
    .heritage-challenge-card h4 { margin: 0 0 0.6rem; font-size: 1.1rem; font-weight: 900; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; }
    .heritage-challenge-card p { margin: 0; font-size: 1.05rem; line-height: 1.6; font-weight: 700; }
    .heritage-complete-btn {
      background: #0038b8;
      color: white;
      border: none;
      border-radius: 1.5rem;
      padding: 1.1rem 2rem;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.08em;
      transition: background 0.15s;
    }
    .heritage-complete-btn:hover { background: #002a8f; }
    .heritage-complete-btn.completed { background: #15803d; }
    .magen-david {
      display: inline-block;
      font-size: 1.6rem;
      line-height: 1;
    }
    @keyframes pulse { 0%,100% { transform:scale(1); box-shadow:0 0 0 0 rgba(255,255,255,0.4); } 50% { transform:scale(1.05); box-shadow:0 0 0 10px rgba(255,255,255,0); } }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-40px) rotate(0deg) scale(1); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(120vh) rotate(720deg) scale(0.5); opacity: 0; }
    }
    @keyframes correctPop {
      0% { transform: scale(0.7); opacity: 0; }
      60% { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
  </style>
</head>

      primary: `On the afternoon of May 14, 1948 \u2014 the 5th of Iyar, 5708 \u2014 David Ben-Gurion stood in the Tel Aviv Museum (now Independence Hall) and read aloud the Declaration of Independence, Megillat Ha'atzmaut (\u05DE\u05D2\u05D9\u05DC\u05EA \u05D4\u05E2\u05E6\u05DE\u05D0\u05D5\u05EA). The declaration had been drafted by a committee over the preceding weeks. The original handwritten scroll \u2014 with its 37 signatories \u2014 is preserved by the National Library of Israel and has been fully digitized. Notably, the word "God" does not appear in the text; instead, the phrase used is "Tzur Yisrael" (\u05E6\u05D5\u05BC\u05E8 \u05D9\u05B4\u05E9\u05B0\u05C2\u05E8\u05B8\u05D0\u05B5\u05DC) \u2014 the Rock of Israel \u2014 a deliberately inclusive phrase that could be interpreted secularly as "the strength of the Jewish people" or religiously as God.
